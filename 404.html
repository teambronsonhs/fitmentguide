<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        // Get the path (e.g., /volvo-c70-1997-to-2005)
        const path = window.location.pathname;
        // Remove the leading slash and .html if present
        let slug = path.substring(1).replace(/\.html$/, '');
        if (slug && slug !== 'index') {
            // Redirect to the parameter version
            window.location.replace(`https://fitmentguide.co.uk/?car=${encodeURIComponent(slug)}`);
        } else {
            window.location.replace('https://fitmentguide.co.uk/');
        }
    </script>
</head>
<body>Redirecting...</body>
</html>
