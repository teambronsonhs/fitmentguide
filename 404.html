<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Page Not Found | Fitment Guide UK</title>
    <meta name="description" content="The wheel fitment page you're looking for doesn't exist. Return to Fitment Guide to search 2,500+ vehicle fitment records.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://fitmentguide.co.uk/">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0c0f15 0%, #151a22 100%);
            color: #e8edf2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .error-container {
            text-align: center;
            max-width: 650px;
            background: rgba(21, 26, 34, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 3rem 2rem;
            border: 1px solid rgba(255, 107, 53, 0.3);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }

        .wheel-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            color: #ff6b35;
        }

        h1 {
            font-size: 7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #ff9a6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        p {
            color: #9aa4bf;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .search-box {
            margin: 2rem 0;
            background: #1e242c;
            border-radius: 60px;
            display: flex;
            overflow: hidden;
            border: 1px solid #2e3540;
        }

        .search-box input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-box input::placeholder {
            color: #6c7a8a;
        }

        .search-box button {
            background: #ff6b35;
            border: none;
            padding: 0 1.8rem;
            color: #0c0f15;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        .search-box button:hover {
            background: #ff8c5a;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s;
        }

        .btn-primary {
            background: #ff6b35;
            color: #0c0f15;
        }

        .btn-primary:hover {
            background: white;
            transform: translateY(-3px);
        }

        .btn-outline {
            border: 1.5px solid #ff6b35;
            color: #ff6b35;
            background: transparent;
        }

        .btn-outline:hover {
            background: #ff6b35;
            color: #0c0f15;
            transform: translateY(-3px);
        }

        .popular-links {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #2a2f3a;
        }

        .popular-links p {
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
            color: #6c7a8a;
        }

        .popular-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
        }

        .tag {
            background: #1e242c;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            text-decoration: none;
            color: #ff9a6e;
            transition: 0.2s;
        }

        .tag:hover {
            background: #ff6b35;
            color: #0c0f15;
        }

        @media (max-width: 600px) {
            .error-container { padding: 2rem 1.5rem; }
            h1 { font-size: 4.5rem; }
            h2 { font-size: 1.3rem; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="wheel-icon">
            <i class="fas fa-car-side"></i>
        </div>
        <h1>404</h1>
        <h2>Wheel Fitment Not Found</h2>
        <p>Oops! The fitment page you're looking for doesn't exist or has been moved.<br>
        Maybe that wheel spec is still being added to our database. 🔧</p>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by make or model... e.g., Audi A3, BMW 3 Series">
            <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
        </div>

        <div class="btn-group">
            <a href="https://fitmentguide.co.uk/" class="btn btn-primary"><i class="fas fa-home"></i> Return to Fitment Guide</a>
            <a href="https://fitmentguide.co.uk/#search" class="btn btn-outline"><i class="fas fa-filter"></i> Browse All Fitments</a>
        </div>

        <div class="popular-links">
            <p><i class="fas fa-fire"></i> Popular searches:</p>
            <div class="popular-tags">
                <a href="https://fitmentguide.co.uk/" onclick="setSearchAndRedirect('Audi')" class="tag">Audi</a>
                <a href="https://fitmentguide.co.uk/" onclick="setSearchAndRedirect('BMW')" class="tag">BMW</a>
                <a href="https://fitmentguide.co.uk/" onclick="setSearchAndRedirect('Mercedes')" class="tag">Mercedes</a>
                <a href="https://fitmentguide.co.uk/" onclick="setSearchAndRedirect('Ford')" class="tag">Ford</a>
                <a href="https://fitmentguide.co.uk/" onclick="setSearchAndRedirect('Volkswagen')" class="tag">Volkswagen</a>
                <a href="https://fitmentguide.co.uk/" onclick="setSearchAndRedirect('Toyota')" class="tag">Toyota</a>
                <a href="https://fitmentguide.co.uk/" onclick="setSearchAndRedirect('5x112')" class="tag">5x112 PCD</a>
                <a href="https://fitmentguide.co.uk/" onclick="setSearchAndRedirect('5x114.3')" class="tag">5x114.3</a>
            </div>
        </div>
    </div>

    <script>
        // Helper to redirect to homepage with search query in localStorage
        function setSearchAndRedirect(query) {
            localStorage.setItem('fitmentSearchQuery', query);
            window.location.href = 'https://fitmentguide.co.uk/';
        }

        document.getElementById('searchBtn').addEventListener('click', function() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                localStorage.setItem('fitmentSearchQuery', query);
                window.location.href = 'https://fitmentguide.co.uk/';
            } else {
                window.location.href = 'https://fitmentguide.co.uk/';
            }
        });

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = document.getElementById('searchInput').value.trim();
                if (query) {
                    localStorage.setItem('fitmentSearchQuery', query);
                    window.location.href = 'https://fitmentguide.co.uk/';
                } else {
                    window.location.href = 'https://fitmentguide.co.uk/';
                }
            }
        });

        // Auto-redirect to homepage after 5 seconds (optional)
        setTimeout(function() {
            window.location.href = 'https://fitmentguide.co.uk/';
        }, 8000);
    </script>
</body>
</html>
